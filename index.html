<!DOCTYPE html>
<html>
<head>
  <title>Thaj Vlog</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .videos {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 20px;
    }

    .video {
      width: 300px;
      transition: 0.3s;
    }

    .video:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h1>🌍 Thaj Vlog</h1>
<p>Travel • Lifestyle • Experiences</p>

<div class="videos" id="videos"></div>

<script>
const apiKey = "AIzaSyB0b5xZPh6isZ6WzsPaOWvUy8BMYsyepPM";
const channelId = "UCnjj2xxgWwjUT2RMlg8Ea7A";

fetch(`https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${channelId}&part=snippet,id&order=date&maxResults=8`)
.then(res => res.json())
.then(data => {
  const container = document.getElementById("videos");

  data.items.forEach(item => {
    if (item.id.videoId) {
      container.innerHTML += `
        <div class="video">
          <a href="https://www.youtube.com/watch?v=${item.id.videoId}" target="_blank">
            <img src="${item.snippet.thumbnails.medium.url}">
            <p>${item.snippet.title}</p>
          </a>
        </div>
      `;
    }
  });
});
</script>

</body>
</html>
