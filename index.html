<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thaj Vlog</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0d0d0d;
  color:white;
}

/* TOP NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#111;
}

.nav img {
  height:40px;
}

.nav button {
  padding:8px 12px;
  background:red;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px 20px;
}

.hero h1 {
  font-size:30px;
}

/* STATS */
.stats {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.stat {
  background:#1c1c1c;
  padding:10px;
  border-radius:8px;
}

/* VIDEOS */
.videos {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
}

.card p {
  padding:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <img src="logo.png">
  <a href="https://www.youtube.com/@itsThajvlog" target="_blank">
    <button>Subscribe</button>
  </a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>🌍 Welcome to Thaj Vlog</h1>

  <p>Each journey tells a story and every moment holds a memory.</p>

  <div class="stats">
    <div class="stat">
      <h3 id="subs">--</h3>
      <p>Subscribers</p>
    </div>
    <div class="stat">
      <h3 id="views">--</h3>
      <p>Views</p>
    </div>
    <div class="stat">
      <h3 id="videosCount">--</h3>
      <p>Videos</p>
    </div>
  </div>
</div>

<!-- VIDEOS -->
<div class="videos" id="videoList"></div>

<script>
const apiKey = "PASTE_YOUR_API_KEY_HERE";
const channelId = "UCnjj2xxgWwjUT2RMlg8Ea7A";

/* STATS */
fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelId}&key=${apiKey}`)
.then(res=>res.json())
.then(data=>{
  let s=data.items[0].statistics;
  document.getElementById("subs").innerText=s.subscriberCount;
  document.getElementById("views").innerText=s.viewCount;
  document.getElementById("videosCount").innerText=s.videoCount;
});

/* VIDEOS */
fetch(`https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${channelId}&part=snippet,id&order=date&maxResults=12`)
.then(res=>res.json())
.then(data=>{
  data.items.forEach(v=>{
    if(v.id.videoId){
      document.getElementById("videoList").innerHTML += `
      <div class="card">
        <a href="https://www.youtube.com/watch?v=${v.id.videoId}" target="_blank">
          <img src="${v.snippet.thumbnails.medium.url}">
          <p>${v.snippet.title}</p>
        </a>
      </div>`;
    }
  });
});
</script>

</body>
</html>
