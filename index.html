!DOCTYPE html>
<html>
<head>
  <title>Thaj Vlog</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .videos {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 20px;
    }

    .video {
      width: 300px;
      transition: 0.3s;
    }

    .video:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>
